<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">
  Delivery Fees 4$ Cash on Delivery
</div>

<header class="navbar">
  <div class="menu-icon" onclick="toggleMenu()">☰</div>

  <div class="logo">
    <img src="logo.png" />
  </div>

  <div class="icons">
    <span>🔍</span>
    <span>👤</span>
    <span class="cart" onclick="toggleCart()">🛒<span class="badge">0</span></span>
  </div>
</header>

<!-- Hero -->
<section class="hero">
  <img src="hero.jpg" class="hero-img" />

 <a href="shop.html" class="shop-btn">Shop Now</a>
</section>


<!-- WhatsApp -->
<a class="whatsapp" href="#">
  <span>💬</span> Chat with us
</a>
<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <span class="close-btn" onclick="toggleMenu()">x</span>
    <span onclick="toggleMenu()">☰</span>
  </div>

  <a href="haircare.html">Haircare →</a>
  <a href="skincare.html">Skincare →</a>
  <a href="brands.html">Brands →</a>
</div>
<div id="cart" class="cart">

  <div class="cart-header">
    <h2>Shopping cart (<span id="cart-count">0</span>)</h2>
    <span onclick="toggleCart()">✖</span>
  </div>
  <div id="cart-items"></div>
  <div class="cart-footer">
    <p>Subtotal: $<span id="subtotal">0</span></p>
    <button class="checkout-btn" onclick="goCheckout()">Checkout</button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>

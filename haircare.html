<!DOCTYPE html>
<html>
<head>
  <title>Haircare</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Haircare Products</h1>

<div class="products">
   <div class="product">
    <img src="product3.jpg">
    <h4>Kerastase Shampoo</h4>
    <p>$35</p>
    <button onclick="addToCart('Kerastase Shampoo', 27, 'product3.jpg')">
  Add to Cart
</button>
  </div>
  <div id="cart" class="cart">
  <div class="cart-header">
    <h2>Shopping cart (<span id="cart-count">0</span>)</h2>
    <span onclick="toggleCart()">✖</span>
  </div>

  <div id="cart-items"></div>

  <div class="cart-footer">
    <p>Subtotal: $<span id="subtotal">0</span></p>
    <button class="checkout-btn" onclick="goCheckout()">Checkout</button>
  </div>
</div>
<script src="haircare.js"></script>
</body>
</html>
